# ====================================================
# AutoPickup Configuration
# ====================================================

autopickup:
  # ====================================================
  # General Settings
  # ====================================================

  # Enable/disable the plugin globally
  enabled: true

  # Whether autopickup is enabled by default for new players
  default-enabled: false

  # Default pickup radius for new players (in blocks)
  default-radius: 5

  # Minimum allowed pickup radius (in blocks)
  min-pickup-radius: 1

  # Maximum allowed pickup radius (in blocks)
  max-pickup-radius: 10

  # How long to keep break/death locations in memory (in milliseconds)
  # Items spawning after this time won't be auto-picked up
  entry-expiry-ms: 500

  # Disable autopickup when players are in creative mode
  disable-in-creative: true

  # Delay before items are picked up (in ticks, 20 ticks = 1 second)
  pickup-delay-ticks: 0

  # ====================================================
  # Notification Settings
  # ====================================================

  # Notification type when items are picked up
  # Options: TITLE, NOTIFICATION, CHAT, NONE
  notification-type: "NOTIFICATION"

  # Notification type when toggling autopickup on/off
  # Options: TITLE, NOTIFICATION, CHAT, NONE
  toggle-notification-type: "TITLE"

  # ====================================================
  # Whitelist/Blacklist Settings
  # ====================================================

  # Enable whitelist mode (only pickup whitelisted blocks)
  whitelist-enabled: false

  # Enable blacklist mode (pickup everything except blacklisted blocks)
  blacklist-enabled: false

  # Whitelist - Only these blocks will be auto-picked up (when whitelist-enabled: true)
  # Supports partial matching (e.g., "Ore" matches all ore types)
  whitelist:
    - "Ore_Copper"
    - "Ore_Iron"
    - "Ore_Gold"
    - "Ore_Silver"
    - "Ore_Emerald"
    - "Ore_Diamond"

  # Blacklist - These blocks will NOT be auto-picked up (when blacklist-enabled: true)
  # Supports partial matching (e.g., "Container" matches all containers)
  blacklist:
    - "Container_Chest"
    - "Container_Barrel"
    - "Container_Coffin"